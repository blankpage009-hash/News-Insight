<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Insight</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#0A0F1C', ink2: '#111A2C', ink3: '#182339', line: '#22314D',
          gold: '#D4A054', gold2: '#E8C384', wire: '#5B8DEF', paper: '#ECE8DC', muted: '#8891A6',
          panel: '#2A3B5F',
        },
        fontFamily: {
          sans: ['"Pretendard Variable"', 'Pretendard', 'sans-serif'],
          serif: ['"Pretendard Variable"', 'Pretendard', 'sans-serif'], // 폰트 통일
          mono: ['"JetBrains Mono"', 'monospace'],
        }
      }
    }
  }
</script>

<style>
  html { font-size: 15px; }
  body { font-family: 'Pretendard Variable', Pretendard, sans-serif; }
  ::selection { background: #D4A05455; }

  /* 지수 티커 : 5개 지수가 끊김 없이 반복 순환 */
  .ticker-viewport { overflow: hidden; }
  .ticker-track {
    display: flex;
    width: max-content;
    white-space: nowrap;
    will-change: transform;
    animation: ticker-marquee 40s linear infinite;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }   /* 사본 1개 분량만 이동 → 무한 루프 */
  }

  @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
  .skeleton { animation: pulse-soft 1.6s ease-in-out infinite; }

  @keyframes modal-in {
    from { opacity: 0; transform: translateY(10px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-pop { animation: modal-in .18s ease-out; }

  .news-row:hover .row-title { color: #E8C384; }

  select { background-image: none; }

  /* 좌측 카테고리바 : 화면에 고정 + 사이드바 안에서만 따로 스크롤 */
  @media (min-width: 1024px) {
    .side-scroll {
      position: sticky;
      top: calc(var(--stick-top, 121px) + 12px);
      max-height: calc(100vh - var(--stick-top, 121px) - 24px);
      overflow-y: auto;
      overscroll-behavior: contain;   /* 사이드바 끝에 닿아도 본문이 따라 움직이지 않음 */
      scrollbar-gutter: stable;
      padding-right: 4px;
    }
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #22314D; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #2c3d5e; }

  @media (prefers-reduced-motion: reduce) {
    .ticker-track, .skeleton, .modal-pop { animation: none; }
  }
</style>
</head>

<body class="bg-ink text-paper min-h-screen">

  <!-- 헤더 + 지수 티커 (스크롤해도 상단 고정) -->
  <div class="sticky top-0 z-40" id="top-bar">
  <header class="border-b border-line bg-ink/90 backdrop-blur px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-gold to-gold2 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-ink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9a2 2 0 0 1 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/></svg>
      </div>
      <div class="leading-tight">
        <h1 class="font-sans font-bold tracking-wide text-paper text-2xl sm:text-3xl">NEWS INSIGHT</h1>
        <p class="font-mono text-muted tracking-widest text-[0.65rem] sm:text-xs">REAL-TIME WIRE DESK</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="font-mono bg-ink2 border border-line px-3 py-1.5 rounded-full text-muted flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> LIVE
      </span>
      <div class="hidden sm:flex flex-col items-end leading-tight font-mono">
        <span id="current-date" class="text-muted"></span>
        <span id="current-time" class="font-semibold text-gold tabular-nums"></span>
      </div>
    </div>
  </header>

  <!-- 지수 티커 -->
  <div class="ticker-viewport bg-ink2 border-b border-line py-2 select-none">
    <div class="ticker-track" id="ticker-track">
      <span id="ticker-content" class="flex items-center gap-12 pr-12 font-mono text-muted"></span>
      <span id="ticker-content-2" class="flex items-center gap-12 pr-12 font-mono text-muted" aria-hidden="true"></span>
    </div>
  </div>
  </div>

  <!-- 메인 -->
  <main class="max-w-[1500px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">

    <!-- 좌측 사이드바 -->
    <aside class="lg:col-span-1 side-scroll">
      <div class="bg-ink2/70 border border-line rounded-2xl p-5 space-y-3">

        <!-- 제목(영문) : 기존 1.18rem → 3pt(=4px) 크게 -->
        <h2 class="font-semibold text-muted uppercase tracking-[0.2em] text-[1.45rem]">SECTION</h2>

        <!-- [추가] SECTION 제목 아래 구분선 -->
        <div class="border-t border-line"></div>

        <!-- Filter (접이식 · 디폴트 숨김) : 노출 건수 / 게재 기간 / 정렬 -->
        <div>
          <button id="filter-toggle-btn" onclick="toggleFilterPanel()"
            class="cat-btn text-[1.25rem] flex items-center justify-between px-4 py-3 rounded-xl transition w-full text-muted hover:bg-ink3">
            <span>Filter</span>
            <span class="flex items-center gap-1.5" id="filter-toggle-icons"></span>
          </button>

          <div id="filter-panel" class="hidden ml-3 mt-2 border-l border-line pl-3 space-y-2">
            <div class="flex items-center justify-between gap-2">
              <label for="count-select" class="text-muted whitespace-nowrap">노출 건수</label>
              <select id="count-select" onchange="onLeftFilterChange()" title="노출 개수"
                class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                <option value="5" selected>5개</option>
                <option value="10">10개</option>
                <option value="15">15개</option>
                <option value="20">20개</option>
                <option value="30">30개</option>
              </select>
            </div>
            <div class="flex items-center justify-between gap-2">
              <label for="hours-select" class="text-muted whitespace-nowrap">게재 기간</label>
              <select id="hours-select" onchange="onLeftFilterChange()" title="기사 게재 기간 (현재 시각 기준)"
                class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                <option value="1">1시간전</option>
                <option value="3">3시간전</option>
                <option value="12">12시간전</option>
                <option value="24" selected>1일전</option>
                <option value="168">1주일전</option>
                <option value="720">1달전</option>
                <option value="8760">1년전</option>
                <option value="all">모두</option>
              </select>
            </div>
            <div class="flex items-center justify-between gap-2">
              <label for="sort-select" class="text-muted whitespace-nowrap">정렬</label>
              <select id="sort-select" onchange="onLeftFilterChange()" title="정렬 기준"
                class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                <option value="sim" selected>정확도순</option>
                <option value="date">최신순</option>
              </select>
            </div>
          </div>
        </div>

        <!-- [추가] 필터와 Today's Briefing 사이 구분선 -->
        <div class="border-t border-line"></div>

        <div class="flex flex-col gap-2" id="category-filters"></div>

        <!-- 카테고리 목록과 키워드 검색 구분선 -->
        <div class="border-t border-line my-2"></div>

        <!-- 키워드 검색 (카테고리 메뉴의 한 항목 · 토글) -->
        <div>
          <button id="search-toggle-btn" onclick="toggleSearchPanel()"
            class="cat-btn text-[1.25rem] flex items-center justify-between px-4 py-3 rounded-xl transition w-full text-muted hover:bg-ink3">
            <span>키워드 검색</span>
            <span class="flex items-center gap-1.5" id="search-toggle-icons"></span>
          </button>

          <div id="search-panel" class="hidden ml-3 mt-2 border-l border-line pl-3 space-y-3">
            <div class="relative">
              <input type="text" id="search-input" placeholder="예: 롯데글로벌로지스, 반도체 수출..."
                class="w-full bg-ink border border-line rounded-xl pl-9 pr-3 py-2.5 focus:outline-none focus:border-gold/70 transition">
              <svg class="absolute left-3 top-3 text-muted w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
            </div>
            <!-- 검색어 규칙 안내 -->
            <p class="text-muted leading-relaxed text-[0.8rem] bg-ink/60 border border-line rounded-lg px-3 py-2">
              <span class="text-gold2 font-semibold">띄어쓰기 = AND</span> · 롯데 한진 → 둘 다 포함<br>
              <span class="text-gold2 font-semibold">콤마(,) = OR</span> · 롯데, 한진 → 하나만 있어도
            </p>

            <!-- 노출 건수 / 게재 기간 / 정렬 -->
            <div class="space-y-2">
              <div class="flex items-center justify-between gap-2">
                <label for="search-count-select" class="text-muted whitespace-nowrap">노출 건수</label>
                <select id="search-count-select" onchange="onSearchClick()" title="노출 개수"
                  class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                  <option value="5">5개</option>
                  <option value="10" selected>10개</option>
                  <option value="15">15개</option>
                  <option value="20">20개</option>
                  <option value="30">30개</option>
                </select>
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="search-hours-select" class="text-muted whitespace-nowrap">게재 기간</label>
                <select id="search-hours-select" onchange="onSearchClick()" title="기사 게재 시간 (현재 시각 기준)"
                  class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                  <option value="1">1시간전</option>
                  <option value="3">3시간전</option>
                  <option value="12">12시간전</option>
                  <option value="24">1일전</option>
                  <option value="168">1주일전</option>
                  <option value="720" selected>1달전</option>
                  <option value="8760">1년전</option>
                  <option value="all">모두</option>
                </select>
              </div>
              <div class="flex items-center justify-between gap-2">
                <label for="search-sort-select" class="text-muted whitespace-nowrap">정렬</label>
                <select id="search-sort-select" onchange="onSearchClick()" title="검색 결과 정렬 기준"
                  class="bg-ink border border-line rounded-lg px-2 py-1.5 text-paper font-mono focus:outline-none focus:border-gold/70">
                  <option value="sim" selected>정확도순</option>
                  <option value="date">최신순</option>
                </select>
              </div>
            </div>
            <div class="flex gap-2">
              <button id="search-btn" onclick="onSearchClick()"
                class="flex-1 flex items-center justify-center gap-2 bg-gold hover:bg-gold2 text-ink font-semibold px-4 py-2.5 rounded-xl transition whitespace-nowrap">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg> 검색
              </button>
              <button onclick="resetSearch()" title="기본값으로 초기화"
                class="flex items-center justify-center gap-1.5 text-muted hover:text-gold border border-line rounded-xl px-3 py-2.5 transition whitespace-nowrap">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 초기화
              </button>
            </div>
          </div>
        </div>

        <!-- [추가] 카테고리/검색 메뉴와 Setting 을 나누는 구분선 -->
        <div class="border-t border-line my-2"></div>

        <!-- [수정] Setting : 누르면 오른쪽(기사 영역)에서 키워드를 설정한다 -->
        <div>
          <button id="setting-toggle-btn" onclick="toggleSettingPanel()"
            class="cat-btn text-[1.25rem] flex items-center justify-between px-4 py-3 rounded-xl transition w-full text-muted hover:bg-ink3">
            <span>Setting</span>
            <span class="flex items-center gap-1.5" id="setting-toggle-icons"></span>
          </button>
        </div>

      </div>
    </aside>

    <!-- 우측 콘텐츠 -->
    <section class="lg:col-span-3 space-y-6">

      <!-- 상태 바 -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 px-1">
        <p class="text-muted" id="status-line">주요 뉴스를 불러오는 중입니다...</p>
        <p class="text-muted whitespace-nowrap">노출 뉴스: <span id="news-count" class="text-gold font-bold">0</span>건</p>
      </div>

      <!-- 안내 배너 -->
      <div id="fallback-banner" class="hidden text-amber-200 bg-amber-900/20 border border-amber-800/40 rounded-xl px-4 py-3 flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span id="fallback-message"></span>
      </div>

      <!-- 카테고리 제목 고정 바 -->
      <div id="cat-header" class="hidden sticky z-30 pt-2 pb-3 bg-ink" style="top: calc(var(--stick-top, 121px) - 1px)">
        <div class="flex items-center gap-x-3 gap-y-2 flex-wrap px-5 py-3.5 bg-panel border border-gold/40 rounded-xl shadow-lg shadow-black/40">
          <span id="cat-header-icon" class="text-gold2 shrink-0"></span>
          <h2 id="cat-header-title" class="font-sans font-bold text-gold2 text-xl truncate"></h2>
          <span id="cat-header-count" class="text-paper/70 font-mono whitespace-nowrap"></span>

          <!-- 제목 바 오른쪽 필터 (노출 건수 / 게재 기간 / 정렬) -->
          <div class="flex items-center gap-1.5 ml-auto flex-wrap">
            <select id="header-count-select" onchange="onHeaderFilterChange()" title="노출 건수"
              class="bg-ink/70 border border-line rounded-lg px-2 py-1 text-paper font-mono text-[0.85rem] focus:outline-none focus:border-gold/70">
              <option value="5">5개</option>
              <option value="10">10개</option>
              <option value="15">15개</option>
              <option value="20">20개</option>
              <option value="30">30개</option>
            </select>
            <select id="header-hours-select" onchange="onHeaderFilterChange()" title="게재 기간"
              class="bg-ink/70 border border-line rounded-lg px-2 py-1 text-paper font-mono text-[0.85rem] focus:outline-none focus:border-gold/70">
              <option value="1">1시간전</option>
              <option value="3">3시간전</option>
              <option value="12">12시간전</option>
              <option value="24">1일전</option>
              <option value="168">1주일전</option>
              <option value="720">1달전</option>
              <option value="8760">1년전</option>
              <option value="all">모두</option>
            </select>
            <select id="header-sort-select" onchange="onHeaderFilterChange()" title="정렬"
              class="bg-ink/70 border border-line rounded-lg px-2 py-1 text-paper font-mono text-[0.85rem] focus:outline-none focus:border-gold/70">
              <option value="sim">정확도순</option>
              <option value="date">최신순</option>
            </select>
          </div>
        </div>
      </div>

      <!-- [추가] 모바일 전용 하위 섹션 필터 칩 (좌측 사이드바가 위로 밀려도 여기서 바로 선택) -->
      <div id="mobile-subnav" class="gap-2 overflow-x-auto pb-1 -mx-1 px-1" style="display:none"></div>

      <!-- [추가] Setting 화면 : 사이드바 Setting을 누르면 여기(기사 영역)에서 키워드를 설정한다 -->
      <div id="setting-view" class="hidden bg-ink2/40 border border-gold/30 rounded-2xl">
        <!-- [수정] 스크롤을 내려도 '저장 후 새로고침/기본값/닫기' 버튼을 바로 쓸 수 있게 헤더를 상단 고정(sticky) -->
        <header class="sticky z-30 rounded-t-2xl flex items-center justify-between gap-x-3 gap-y-2 flex-wrap px-5 py-3 bg-gradient-to-r from-gold/20 via-ink2 to-ink2 border-b border-line"
          style="top: calc(var(--stick-top, 121px) - 1px)">
          <div class="flex items-center gap-2.5 min-w-0">
            <span class="text-gold shrink-0" id="setting-view-icon"></span>
            <h2 class="font-sans font-bold text-gold text-xl truncate">기사 가져오기 키워드 설정</h2>
          </div>
          <!-- [수정] 저장/기본값 버튼을 제목 옆(헤더)으로 이동 -->
          <div class="flex items-center gap-2 shrink-0">
            <button id="setting-save-btn" onclick="saveKeywordSettings()"
              class="flex items-center justify-center gap-1.5 bg-gold hover:bg-gold2 text-ink font-semibold px-3.5 py-2 rounded-lg transition text-[0.9rem] whitespace-nowrap">
              저장 후 새로고침
            </button>
            <button onclick="resetKeywordSettings()" title="기본값으로 되돌리기"
              class="flex items-center justify-center text-muted hover:text-gold border border-line rounded-lg px-3 py-2 transition text-[0.9rem] whitespace-nowrap">
              기본값
            </button>
            <button onclick="closeSettingView(false)" title="닫고 기사로 돌아가기"
              class="flex items-center justify-center text-muted hover:text-gold border border-line rounded-lg px-3 py-2 transition text-[0.9rem] whitespace-nowrap">닫기</button>
          </div>
        </header>
        <div class="p-5 space-y-3">
          <p class="text-muted leading-relaxed text-[1.05rem] bg-ink/60 border border-line rounded-lg px-3 py-2.5">
            섹션별로 <span class="text-gold2 font-semibold">포함</span>·<span class="text-gold2 font-semibold">제외</span> 키워드를 정하면
            항상 이 값을 기준으로 기사를 가져옵니다. 여러 개는 <span class="text-gold2 font-semibold">콤마(,)</span>로 구분하세요.
          </p>

          <!-- 섹션별 포함/제외 키워드 입력칸 (JS가 그려 넣음) -->
          <div id="keyword-settings" class="space-y-2"></div>
        </div>
      </div>

      <!-- 결과 -->
      <div id="news-list" class="space-y-5"></div>

    </section>
  </main>

  <!-- 요약 팝업 모달 -->
  <div id="summary-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-3 sm:p-6" onclick="closeSummaryOnBackdrop(event)">
    <div class="modal-pop bg-ink2 border border-line rounded-2xl w-full max-w-5xl max-h-[94vh] flex flex-col" onclick="event.stopPropagation()">
      <div class="flex justify-between items-start gap-4 p-6 pb-3 shrink-0">
        <span id="modal-category" class="font-bold uppercase tracking-widest px-2.5 py-1 bg-wire/15 text-wire rounded-md border border-wire/30"></span>
        <button onclick="closeSummary()" class="text-muted hover:text-paper transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'

    function icon(name, cls) {
      return `<svg class="${cls || ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name] || ''}</svg>`;
    }

    const NAVER_PROXY_BASE = '';

    // ---------------------------------------------------------------
    // [추가] 기사 가져오기 키워드 설정 (Setting)
    //   - 각 섹션(하위 섹션 포함)의 '포함/제외 키워드'를 사용자가 직접 정한다.
    //   - 이 값은 브라우저에 저장되고, 기사 요청 시 서버로 함께 보내 항상 반영된다.
    //   - 디폴트 값은 현재 코드(server.js)에 들어 있던 각 섹션 키워드와 동일하다.
    // ---------------------------------------------------------------
    // 도메인 공통 제외어 (server.js 의 DOMAINS[*].exclude 와 동일)
    const LOGI_EXCLUDE = ['관광','여행','트래블','패키지여행','항공권','호텔','리조트','면세','골프','레저','유람선','크루즈','뮤지컬','공연'];
    const STOCK_EXCLUDE = ['부고','인사이동','채용공고'];

    const DEFAULT_KEYWORDS = {
      // 상위 섹션 (전체 화면에서 사용)
      breaking:             { include: ['속보'], exclude: [] },
      logistics:            { include: ['물류', '롯데글로벌로지스'], exclude: [...LOGI_EXCLUDE] },
      economy:              { include: ['경제 금리'], exclude: [] },
      society:              { include: ['정치', '국회', '사건사고'], exclude: [] },
      global:               { include: ['국제'], exclude: [] },
      stock:                { include: ['증시 코스피'], exclude: [...STOCK_EXCLUDE] },
      // 물류 하위 섹션
      logistics_lotte:      { include: ['롯데글로벌로지스', '롯데택배'], exclude: [...LOGI_EXCLUDE] },
      logistics_competitor: { include: ['CJ대한통운','한진택배','한진 물류','한진 택배','LX판토스','삼성SDS 물류','현대글로비스'], exclude: [...LOGI_EXCLUDE] },
      logistics_domestic:   { include: ['국내 물류','국내물류'], exclude: [...LOGI_EXCLUDE] },

      stock_issue:          { include: ['테마주','급등주','수혜주','증시 이슈'], exclude: [...STOCK_EXCLUDE] },
    };

    // 설정 화면에 보여줄 순서와 들여쓰기 (depth 1 = 하위 섹션)
    const KEYWORD_SETTING_ORDER = [
      { key: 'breaking', depth: 0 },
      { key: 'logistics', depth: 0 },
      { key: 'logistics_lotte', depth: 1 },
      { key: 'logistics_competitor', depth: 1 },
      { key: 'logistics_domestic', depth: 1 },
      { key: 'logistics_global', depth: 1 },
      { key: 'logistics_freight', depth: 1 },
      { key: 'economy', depth: 0 },
      { key: 'society', depth: 0 },
      { key: 'global', depth: 0 },
      { key: 'stock', depth: 0 },
      { key: 'stock_domestic', depth: 1 },
      { key: 'stock_us', depth: 1 },
      { key: 'stock_issue', depth: 1 },
    ];

    const KEYWORDS_STORAGE_KEY = 'newsInsightKeywords_v1';
    let userKeywords = {};   // 현재 사용 중인 키워드 설정

    // 깊은 복사 (기본값을 건드리지 않기 위해)
    function cloneKeywords(src) {
      const out = {};
      Object.keys(src).forEach((k) => {
        out[k] = { include: [...(src[k].include || [])], exclude: [...(src[k].exclude || [])] };
      });
      return out;
    }

    // 저장된 설정을 불러오되, 기본값 위에 덮어써 누락 없이 채운다.
    function loadKeywords() {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(KEYWORDS_STORAGE_KEY) || '{}') || {}; } catch { saved = {}; }
      const merged = cloneKeywords(DEFAULT_KEYWORDS);
      Object.keys(merged).forEach((k) => {
        if (saved[k]) {
          if (Array.isArray(saved[k].include)) merged[k].include = saved[k].include;
          if (Array.isArray(saved[k].exclude)) merged[k].exclude = saved[k].exclude;
        }
      });
      userKeywords = merged;
      return merged;
    }

    function persistKeywords() {
      try { localStorage.setItem(KEYWORDS_STORAGE_KEY, JSON.stringify(userKeywords)); } catch {}
    }

    // 서버 요청에 붙일 kw 파라미터에 현재 설정을 담는다.
    function setKwParam(params) {
      params.set('kw', JSON.stringify(userKeywords));
      return params;
    }

    // "롯데, 한진" → ['롯데','한진']
    function parseKwText(t) {
      return String(t || '').split(',').map((s) => s.trim()).filter(Boolean);
    }

    // 키워드가 입력돼 있으면 '키워드 검색' 패널의 설정을, 아니면 상단 카테고리 설정을 쓴다
    function isKeywordMode() { return document.getElementById('search-input').value.trim() !== ''; }
    function getCount() {
      const id = isKeywordMode() ? 'search-count-select' : 'count-select';
      return Number(document.getElementById(id).value) || 5;
    }
    // 기사 게재 시간(현재 시각 기준 몇 시간 이내인지). 'all' = 전체 기간
    function getHours() {
      const id = isKeywordMode() ? 'search-hours-select' : 'hours-select';
      return document.getElementById(id).value || '24';
    }
    function getSort() {
      const id = isKeywordMode() ? 'search-sort-select' : 'sort-select';
      return document.getElementById(id).value || 'sim';
    }

    // 현재 정렬값에 맞춰 목록 정렬 (최신순=date만 클라이언트 정렬, 정확도순=서버 순서 유지)
    function sortItemsByCurrent(list) {
      if (getSort() !== 'date') return list;
      return [...list].sort((a, b) => {
        const ta = new Date(a.datetime || 0).getTime() || 0;
        const tb = new Date(b.datetime || 0).getTime() || 0;
        return tb - ta;
      });
    }
    const HOURS_LABEL = { 1: '1시간', 3: '3시간', 12: '12시간', 24: '1일', 168: '1주일', 720: '1달', 8760: '1년', all: '전체 기간' };
    function hoursLabel() { return HOURS_LABEL[getHours()] || getHours() + '시간'; }

    // ---------------------------------------------------------------
    // 초기화
    // ---------------------------------------------------------------
    function init() {
      loadKeywords();               // [추가] 저장된 '기사 가져오기 키워드' 불러오기
      renderCategoryButtons();
      renderSearchToggle();
      renderFilterToggle();
      renderSettingToggle();        // [추가]
      renderKeywordSettings();      // [추가]
      updateStickTop();
      window.addEventListener('resize', updateStickTop);
      window.addEventListener('resize', renderMobileSubnav);   // [추가] 회전/리사이즈 시 모바일 칩 갱신

      // [추가] 제목 바 틀고정 '유격' 방지 :
      //   웹폰트 로딩·레이아웃이 확정된 뒤 상단바 높이를 다시 재서 고정 위치를 정확히 맞춘다.
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(updateStickTop);
      setTimeout(updateStickTop, 300);
      if (window.ResizeObserver) {
        new ResizeObserver(updateStickTop).observe(document.getElementById('top-bar'));
      }

      updateClock();
      setInterval(updateClock, 1000);

      refreshIndexTicker();
      setInterval(refreshIndexTicker, 30000);

      document.getElementById('search-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') onSearchClick();
      });

      runSearch();
    }

    // ---------------------------------------------------------------
    // 키워드 검색 토글 (카테고리 메뉴 항목)
    // ---------------------------------------------------------------
    function renderSearchToggle() {
      document.getElementById('search-toggle-icons').innerHTML =
        icon('search', 'w-5 h-5') + icon(expandedSearch ? 'chevron-up' : 'chevron-down', 'w-4 h-4 opacity-70');
      const panel = document.getElementById('search-panel');
      panel.classList.toggle('hidden', !expandedSearch);
      const btn = document.getElementById('search-toggle-btn');
      btn.classList.toggle('text-gold2', expandedSearch);
      btn.classList.toggle('bg-ink3', expandedSearch);
      btn.classList.toggle('text-muted', !expandedSearch);
    }

    function toggleSearchPanel() {
      expandedSearch = !expandedSearch;
      renderSearchToggle();
      if (expandedSearch) document.getElementById('search-input').focus();
    }

    // ---------------------------------------------------------------
    // Filter 토글 (노출 건수 / 게재 기간 / 정렬) · 디폴트 숨김
    // ---------------------------------------------------------------
    function renderFilterToggle() {
      document.getElementById('filter-toggle-icons').innerHTML =
        icon('sliders', 'w-5 h-5') + icon(expandedFilter ? 'chevron-up' : 'chevron-down', 'w-4 h-4 opacity-70');
      document.getElementById('filter-panel').classList.toggle('hidden', !expandedFilter);
      const btn = document.getElementById('filter-toggle-btn');
      btn.classList.toggle('text-gold2', expandedFilter);
      btn.classList.toggle('bg-ink3', expandedFilter);
      btn.classList.toggle('text-muted', !expandedFilter);
    }

    function toggleFilterPanel() {
      expandedFilter = !expandedFilter;
      renderFilterToggle();
    }

    // ---------------------------------------------------------------
    // [수정] Setting : 사이드바 버튼을 누르면 '오른쪽 기사 영역'에 설정 화면을 연다.
    //   settingMode = true  → 오른쪽에 키워드 설정 UI를 보여주고 기사 목록은 숨김
    //   settingMode = false → 다시 기사 목록으로 돌아감
    // ---------------------------------------------------------------
    function renderSettingToggle() {
      document.getElementById('setting-toggle-icons').innerHTML =
        icon('settings', 'w-5 h-5') + icon(settingMode ? 'chevron-up' : 'chevron-down', 'w-4 h-4 opacity-70');
      const btn = document.getElementById('setting-toggle-btn');
      btn.classList.toggle('text-gold2', settingMode);
      btn.classList.toggle('bg-ink3', settingMode);
      btn.classList.toggle('text-muted', !settingMode);
    }

    function toggleSettingPanel() {
      if (settingMode) closeSettingView(false);
      else openSettingView();
    }

    // 오른쪽(기사 영역)에 키워드 설정 화면을 연다.
    function openSettingView() {
      settingMode = true;
      renderKeywordSettings();                       // 최신 값으로 입력칸 다시 그림
      hideFallbackBanner();
      document.getElementById('news-list').classList.add('hidden');
      document.getElementById('cat-header').classList.add('hidden');
      const sub = document.getElementById('mobile-subnav');
      if (sub) sub.style.display = 'none';
      const iconEl = document.getElementById('setting-view-icon');
      if (iconEl) iconEl.innerHTML = icon('settings', 'w-5 h-5');
      document.getElementById('setting-view').classList.remove('hidden');
      document.getElementById('status-line').textContent =
        '기사 가져오기 키워드 설정 · 섹션별 포함/제외 키워드를 정하세요.';
      renderSettingToggle();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 설정 화면을 닫고 기사 화면으로 돌아간다. rerun=true 면 새 키워드로 다시 검색.
    function closeSettingView(rerun) {
      settingMode = false;
      document.getElementById('setting-view').classList.add('hidden');
      document.getElementById('news-list').classList.remove('hidden');
      renderSettingToggle();
      if (rerun) {
        runSearch();                       // 새 키워드로 다시 가져오기 (제목 바도 이때 갱신됨)
      } else if (currentResults.length) {
        updateCatHeader();                 // 그냥 닫기 → 보고 있던 제목 바/칩 원래대로 복구
      }
    }

    // 한 섹션의 '포함/제외 키워드' 입력칸(제목 없이 텍스트박스 2개)만 만든다.
    function kwFieldRow(key) {
      const taClass = 'w-full bg-ink border border-line rounded-lg px-2.5 py-2 text-paper text-[1.05rem] focus:outline-none focus:border-gold/70 resize-y';
      const kwv = userKeywords[key] || { include: [], exclude: [] };
      const inc = esc((kwv.include || []).join(', '));
      const exc = esc((kwv.exclude || []).join(', '));
      return `
        <div class="space-y-2">
          <div>
            <label class="text-muted text-[0.9rem] block mb-1">포함 키워드</label>
            <textarea data-kw-key="${key}" data-kw-type="include" rows="2" class="${taClass}" placeholder="예: 물류, 택배">${inc}</textarea>
          </div>
          <div>
            <label class="text-muted text-[0.9rem] block mb-1">제외 키워드</label>
            <textarea data-kw-key="${key}" data-kw-type="exclude" rows="2" class="${taClass}" placeholder="예: 여행, 관광">${exc}</textarea>
          </div>
        </div>`;
    }

    // 한 섹션을 '토글 버튼 + 접히는 본문' 카드로 만든다. (상위/하위 공용)
    //  [수정] 하위 섹션(isChild=true)도 각자 토글 버튼을 갖는다.
    function kwSectionHtml(key, children, isChild) {
      const kwv = userKeywords[key] || { include: [], exclude: [] };
      const incN = (kwv.include || []).length;
      const excN = (kwv.exclude || []).length;
      const childN = children.length;
      const collapsed = settingCollapsed[key] !== false;   // 기본값: 접힘(true)
      const bodyHidden = collapsed ? 'hidden' : '';
      const chevRot = collapsed ? 'rotate(0deg)' : 'rotate(180deg)';
      const childrenHtml = children.map((c) => kwSectionHtml(c, [], true)).join('');

      // 상위/하위에 따라 카드 모양·글자 크기·들여쓰기를 다르게 준다.
      const cardClass = isChild
        ? 'ml-2 bg-ink/25 border border-line/70 rounded-lg overflow-hidden'
        : 'bg-ink/40 border border-line rounded-lg overflow-hidden';
      const titleSize = isChild ? 'text-[1.02rem]' : 'text-[1.15rem]';
      const iconEl = isChild
        ? '<span class="text-muted shrink-0 font-mono">└</span>'
        : `<span class="text-gold2 shrink-0">${icon(categoryIcons[key] || 'grid', 'w-4 h-4')}</span>`;

      return `
        <div class="${cardClass}">
          <button type="button" onclick="toggleSettingSection('${key}')"
            class="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-ink3/60 transition text-left">
            ${iconEl}
            <span class="font-semibold text-paper ${titleSize}">${categoryLabels[key] || key}</span>
            <span class="font-mono text-muted text-[0.8rem] whitespace-nowrap">포함 ${incN} · 제외 ${excN}${childN ? ` · 하위 ${childN}` : ''}</span>
            <span id="setting-chev-${key}" class="text-muted ml-auto shrink-0 transition-transform" style="transform:${chevRot}">${icon('chevron-down', 'w-5 h-5')}</span>
          </button>
          <div id="setting-body-${key}" class="${bodyHidden} px-3 pb-3 pt-1 space-y-3 border-t border-line/60">
            ${kwFieldRow(key)}
            ${childrenHtml}
          </div>
        </div>`;
    }

    // 섹션별 포함/제외 키워드 입력칸을 그린다.
    //  상위 섹션 → 토글, 그 안의 하위 섹션도 각각 토글.
    function renderKeywordSettings() {
      const wrap = document.getElementById('keyword-settings');
      if (!wrap) return;

      // KEYWORD_SETTING_ORDER를 상위 섹션 기준으로 묶는다. (하위 섹션은 직전 상위에 붙임)
      const groups = [];
      KEYWORD_SETTING_ORDER.forEach(({ key, depth }) => {
        if (depth === 0) groups.push({ key, children: [] });
        else if (groups.length) groups[groups.length - 1].children.push(key);
      });

      wrap.innerHTML = groups.map((g) => kwSectionHtml(g.key, g.children, false)).join('');
    }

    // 섹션 제목(토글 버튼)을 누르면 해당 섹션을 펼치거나 접는다. (입력값은 그대로 유지)
    function toggleSettingSection(key) {
      const body = document.getElementById('setting-body-' + key);
      const chev = document.getElementById('setting-chev-' + key);
      if (!body) return;
      const willOpen = body.classList.contains('hidden');   // 지금 숨겨져 있으면 → 펼친다
      body.classList.toggle('hidden', !willOpen);
      settingCollapsed[key] = !willOpen;                    // 상태 기억 (다시 그릴 때 유지)
      if (chev) chev.style.transform = willOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    // 입력한 키워드를 저장하고, 설정 화면을 닫은 뒤 새 기준으로 기사를 다시 불러온다.
    function saveKeywordSettings() {
      document.querySelectorAll('#keyword-settings textarea[data-kw-key]').forEach((ta) => {
        const key = ta.getAttribute('data-kw-key');
        const type = ta.getAttribute('data-kw-type');
        if (!userKeywords[key]) userKeywords[key] = { include: [], exclude: [] };
        userKeywords[key][type] = parseKwText(ta.value);
      });
      persistKeywords();
      closeSettingView(true);   // 설정 화면 닫고 → 새 키워드로 즉시 다시 가져오기
    }

    // 모든 키워드를 기본값으로 되돌린다. (설정 화면에는 그대로 머무름)
    //  [수정] 실수 방지를 위해 한 번 더 확인한 뒤 실행한다.
    function resetKeywordSettings() {
      const ok = window.confirm('모든 섹션의 포함/제외 키워드를 기본값으로 되돌립니다.\n지금 입력한 내용은 사라집니다. 계속할까요?');
      if (!ok) return;   // '취소'를 누르면 아무것도 하지 않음
      userKeywords = cloneKeywords(DEFAULT_KEYWORDS);
      persistKeywords();
      renderKeywordSettings();   // 입력칸을 기본값으로 다시 그려줌
    }

    // 좌측 Filter를 바꾸면 검색을 다시 실행 (제목 바 필터는 updateCatHeader에서 자동 동기화)
    function onLeftFilterChange() { runSearch(); }

    // 제목 바 필터를 바꾸면 → 현재 모드(키워드/카테고리)에 맞는 원본 필터 값을 갱신 후 재검색
    function onHeaderFilterChange() {
      const kw = isKeywordMode();
      document.getElementById(kw ? 'search-count-select' : 'count-select').value =
        document.getElementById('header-count-select').value;
      document.getElementById(kw ? 'search-hours-select' : 'hours-select').value =
        document.getElementById('header-hours-select').value;
      document.getElementById(kw ? 'search-sort-select' : 'sort-select').value =
        document.getElementById('header-sort-select').value;
      runSearch();
    }

    // 제목 바 드롭다운을 현재 유효한 필터 값으로 맞춘다 (updateCatHeader에서 호출)
    function syncHeaderFilters() {
      const c = document.getElementById('header-count-select');
      const h = document.getElementById('header-hours-select');
      const s = document.getElementById('header-sort-select');
      if (c) c.value = String(getCount());
      if (h) h.value = String(getHours());
      if (s) s.value = getSort();
    }

    // ---------------------------------------------------------------
    // 카테고리 사이드바
    // ---------------------------------------------------------------
    // 하위 카테고리를 가진 상위 카테고리 정의
    const EXPANDABLE = {
      logistics: { subs: logisticsSubcategories, isOpen: () => expandedLogistics },
      stock: { subs: stockSubcategories, isOpen: () => expandedStock },
    };

    function renderCategoryButtons() {
      const wrap = document.getElementById('category-filters');
      let html = '';

      topLevelCategories.forEach((cat) => {
        const exp = EXPANDABLE[cat];
        const isActive = currentCategory === cat;
        const isBriefing = cat === 'briefing';

        html += `<div>`;
        html += `
          <button onclick="${exp ? `onExpandableClick('${cat}')` : `selectCategory('${cat}')`}" data-cat="${cat}"
            class="cat-btn ${isBriefing ? 'text-[1.15rem]' : 'text-[1.25rem]'} flex items-center justify-between px-4 py-3 rounded-xl transition w-full ${isActive ? 'bg-gold text-ink font-semibold' : 'text-muted hover:bg-ink3'} ${isBriefing && !isActive ? 'border border-gold/40 text-gold2' : ''}">
            <span>${categoryLabels[cat]}</span>
            <span class="flex items-center gap-1.5">
              ${icon(categoryIcons[cat], 'w-5 h-5')}
              ${exp ? icon(exp.isOpen() ? 'chevron-up' : 'chevron-down', 'w-4 h-4 opacity-70') : ''}
            </span>
          </button>`;

        if (exp && exp.isOpen()) {
          html += `<div class="ml-3 mt-1 flex flex-col gap-1 border-l border-line pl-3">`;
          exp.subs.forEach((sub) => {
            const subActive = currentCategory === sub.key;
            html += `
              <button onclick="selectCategory('${sub.key}')" data-cat="${sub.key}"
                class="cat-btn text-[1.1rem] text-left px-3 py-2.5 rounded-lg transition ${subActive ? 'bg-gold/90 text-ink font-semibold' : 'text-muted hover:bg-ink3'}">
                ${sub.label}
              </button>`;
          });
          html += `</div>`;
        }
        html += `</div>`;

        // Today's Briefing 아래 구분선
        if (isBriefing) html += `<div class="border-t border-line my-2"></div>`;
      });

      wrap.innerHTML = html;
    }

    // 상단바(헤더+티커) 높이를 재서 고정 위치 기준값으로 저장
    //  offsetHeight 는 정수라 소수점이 버려져 미세한 유격이 생길 수 있어
    //  getBoundingClientRect().height 로 실제 렌더 높이를 반올림해 쓴다.
    function updateStickTop() {
      const bar = document.getElementById('top-bar');
      if (!bar) return;
      const h = Math.round(bar.getBoundingClientRect().height);
      document.documentElement.style.setProperty('--stick-top', h + 'px');
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('current-date').textContent =
        now.toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      document.getElementById('current-time').textContent =
        now.toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' KST';
    }

    // ---------------------------------------------------------------
    // 카테고리 / 검색 트리거
    // ---------------------------------------------------------------
    function setExpanded(cat, open) {
      if (cat === 'logistics') expandedLogistics = open;
      if (cat === 'stock') expandedStock = open;
    }

    // 물류 / 증시처럼 하위 카테고리가 있는 버튼 클릭
    function onExpandableClick(cat) {
      const inThisGroup = currentCategory === cat || currentCategory.startsWith(cat + '_');
      if (inThisGroup) {
        const willOpen = !EXPANDABLE[cat].isOpen();
        setExpanded(cat, willOpen);
        if (!willOpen) { renderCategoryButtons(); return; }
      } else {
        setExpanded(cat, true);
      }
      currentCategory = cat;
      renderCategoryButtons();
      runSearch();
    }

    function selectCategory(cat) {
      currentCategory = cat;
      Object.keys(EXPANDABLE).forEach((g) => {
        setExpanded(g, cat === g || cat.startsWith(g + '_'));
      });
      renderCategoryButtons();
      runSearch();
    }

    function onSearchClick() { runSearch(); }

    function resetSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('count-select').value = '5';
      document.getElementById('hours-select').value = '24';
      document.getElementById('sort-select').value = 'sim';
      document.getElementById('search-count-select').value = '10';
      document.getElementById('search-hours-select').value = '720';
      document.getElementById('search-sort-select').value = 'sim';
      currentCategory = 'briefing';
      expandedLogistics = false;
      expandedStock = false;
      expandedSearch = false;
      expandedFilter = false;
      renderSearchToggle();
      renderFilterToggle();
      renderCategoryButtons();
      runSearch();
    }

    // ---------------------------------------------------------------
    // 서버 API
    // ---------------------------------------------------------------
    async function apiGet(pathAndQuery) {
      const response = await fetch(`${NAVER_PROXY_BASE}${pathAndQuery}`);
      if (!response.ok) {
        let message = 'API 요청 실패: ' + response.status;
        try { const b = await response.json(); if (b.error) message = b.error; } catch {}
        throw new Error(message);
      }
      return response.json();
    }

    async function fetchFlatNews({ q, display, sort }) {
      const params = new URLSearchParams({
        q,
        display: String(display || getCount()),
        hours: String(getHours()),
        sort: sort || 'date',
      });
      const data = await apiGet(`/api/news?${params.toString()}`);
      if (!Array.isArray(data.items)) throw new Error('예상치 못한 응답 형식입니다.');
      return data;   // { items, mode, relaxed, requested, ... }
    }

    async function fetchBriefing({ dateFrom, dateTo }) {
      const params = new URLSearchParams({ limit: String(getCount()), hours: String(getHours()) });
      if (dateFrom) params.set('dateFrom', dateFrom);
      if (dateTo) params.set('dateTo', dateTo);
      setKwParam(params);   // [추가] 키워드 설정 반영
      const data = await apiGet(`/api/briefing?${params.toString()}`);
      if (!Array.isArray(data.items)) throw new Error('예상치 못한 응답 형식입니다.');
      return data.items;
    }

    // 섹션은 항상 30건 받아옴 → 박스별 개수 필터를 재검색 없이 즉시 반영
    async function fetchSectionsData(endpoint, { dateFrom, dateTo }) {
      const params = new URLSearchParams({ perSection: '30', hours: String(getHours()) });
      if (dateFrom) params.set('dateFrom', dateFrom);
      if (dateTo) params.set('dateTo', dateTo);
      setKwParam(params);   // [추가] 키워드 설정 반영
      const data = await apiGet(`${endpoint}?${params.toString()}`);
      if (!Array.isArray(data.sections)) throw new Error('예상치 못한 응답 형식입니다.');
      return data.sections;
    }

    async function fetchSubSectionData(base, key, { dateFrom, dateTo }) {
      const params = new URLSearchParams({ display: String(getCount()), hours: String(getHours()) });
      if (dateFrom) params.set('dateFrom', dateFrom);
      if (dateTo) params.set('dateTo', dateTo);
      setKwParam(params);   // [추가] 키워드 설정 반영
      const data = await apiGet(`/api/${base}/section/${key}?${params.toString()}`);
      if (!Array.isArray(data.items)) throw new Error('예상치 못한 응답 형식입니다.');
      return data.items;
    }

    // [추가] 단일 상위 섹션(경제/정치·사회/글로벌 등) : '전체' 화면과 같은 키워드 설정 사용
    async function fetchTopic(key, { dateFrom, dateTo }) {
      const params = new URLSearchParams({ display: String(getCount()), hours: String(getHours()) });
      if (dateFrom) params.set('dateFrom', dateFrom);
      if (dateTo) params.set('dateTo', dateTo);
      setKwParam(params);
      const data = await apiGet(`/api/topic/${key}?${params.toString()}`);
      if (!Array.isArray(data.items)) throw new Error('예상치 못한 응답 형식입니다.');
      return data.items;
    }

    // ---------------------------------------------------------------
    // [수정] 기사 링크 결정 : 모든 버튼(요약/주요 내용/원문보기)이 같은 주소를 쓰게 한다
    //  - 네이버가 주는 originallink(언론사 주소)는 언론사가 등록해 둔 값이라
    //    가끔 기사 대신 홈/목록/다른 기사로 연결된다.
    //  - 그래서 '기사 주소처럼 생겼는지' 검사해서 아니면 네이버 뉴스 링크(link)를 쓴다.
    //    네이버 링크는 그 기사 자체를 가리키므로 절대 엉뚱한 기사로 가지 않는다.
    // ---------------------------------------------------------------
    function looksLikeArticleUrl(u) {
      try {
        const { pathname, search } = new URL(u);
        if (!pathname || pathname === '/') return false;                       // 홈페이지
        if (/^\/(news|article|articles|list|section|sections)\/?$/i.test(pathname)) return false; // 목록 페이지
        return /\d{4,}/.test(pathname + search);                               // 기사 고유번호(4자리 이상 숫자)
      } catch { return false; }
    }

    function articleLink(item) {
      const naver = /^https?:\/\/(n|m)\.news\.naver\.com\//i.test(item.naverUrl || '') ? item.naverUrl : '';
      const orig = item.url && item.url !== '#' ? item.url : '';
      if (!orig) return naver || '#';
      if (!naver) return orig;
      return looksLikeArticleUrl(orig) ? orig : naver;
    }

    function decorateItems(items, category) {
      return items.map((item) => ({
        id: nextId++,
        title: item.title || '(제목 없음)',
        summary: Array.isArray(item.summary) && item.summary.length ? item.summary : ['요약 없음'],
        source: item.source || '출처 미상',
        url: item.url || '#',
        naverUrl: item.naverUrl || '',   // [수정] 서버가 준 네이버 뉴스 링크를 버리지 않고 보관
        datetime: item.datetime || '',
        cat: item.cat || null,
        // 이 기사가 걸린 카테고리 목록 (서버가 cats를 주면 그대로, 없으면 단일값)
        cats: (Array.isArray(item.cats) && item.cats.length)
          ? [...item.cats]
          : [item.cat || category],
        category
      }));
    }

    // 같은 URL 기사가 여러 섹션에 등장하면 카테고리를 모두 합쳐준다.
    //  - 여러 섹션에 겹친 기사는 걸린 섹션을 모두 태그로 갖는다. (요청 5)
    //  - 한 섹션에만 있는 기사도 반드시 자기 섹션 키를 태그로 갖도록 보장한다. (요청 4)
    function mergeCatsAcrossSections(sections) {
      const map = new Map(); // url -> Set(카테고리 key)
      sections.forEach((sec) => sec.items.forEach((it) => {
        if (!it.url || it.url === '#') return;
        if (!map.has(it.url)) map.set(it.url, new Set());
        map.get(it.url).add(sec.key);
      }));
      sections.forEach((sec) => sec.items.forEach((it) => {
        const set = (it.url && it.url !== '#') ? map.get(it.url) : null;
        // URL이 겹쳐 여러 섹션에 걸렸으면 그 목록을, 아니면 자기 섹션 키를 태그로 쓴다.
        it.cats = (set && set.size) ? [...set] : [sec.key];
      }));
    }

    // ---------------------------------------------------------------
    // 카테고리 제목 고정 바
    // ---------------------------------------------------------------
    function updateCatHeader() {
      const el = document.getElementById('cat-header');
      const keyword = document.getElementById('search-input').value.trim();

      // [추가] 모바일 하위 섹션 칩은 브리핑 여부와 관계없이 항상 상태에 맞게 갱신
      renderMobileSubnav();

      // [수정] 하위 섹션을 고른 경우엔 '상위>하위' 형태로 보여준다 (예: 물류>경쟁사)
      let label;
      if (keyword) {
        label = `"${keyword}" 검색 결과`;
      } else if (isSubCategory(currentCategory)) {
        const parent = parentCategoryOf(currentCategory);
        label = `${categoryLabels[parent]}>${categoryLabels[currentCategory]}`;
      } else {
        label = categoryLabels[currentCategory] || '뉴스';
      }
      const iconName = keyword ? 'search' : (categoryIcons[currentCategory] || 'grid');
      document.getElementById('cat-header-icon').innerHTML = icon(iconName, 'w-5 h-5');
      document.getElementById('cat-header-title').textContent = label;
      document.getElementById('cat-header-count').textContent = visibleCount() + '건';
      syncHeaderFilters();
      el.classList.remove('hidden');
    }

    // ---------------------------------------------------------------
    // [추가] 모바일 전용 하위 섹션 필터 칩
    //  - 데스크톱(≥1024px)은 좌측 사이드바가 늘 보이므로 칩을 숨긴다.
    //  - 물류/증시(상위) 또는 그 하위 섹션을 보고 있을 때만 칩을 노출한다.
    //  - 칩을 누르면 곧바로 해당 하위 섹션 기사만 표출된다.
    // ---------------------------------------------------------------
    function renderMobileSubnav() {
      const el = document.getElementById('mobile-subnav');
      if (!el) return;

      // [추가] 설정 화면이 열려 있으면 칩을 숨긴다
      if (settingMode) { el.style.display = 'none'; el.innerHTML = ''; return; }

      // 데스크톱에서는 사용하지 않음
      if (window.innerWidth >= 1024) { el.style.display = 'none'; return; }

      const keyword = document.getElementById('search-input').value.trim();
      // 지금 보고 있는 화면이 어느 상위 섹션에 속하는지 판단
      let parent = null;
      if (!keyword) {
        if (currentCategory === 'logistics' || currentCategory === 'stock') parent = currentCategory;
        else parent = parentCategoryOf(currentCategory); // 하위 섹션이면 상위로 환산
      }

      // 물류/증시 계열이 아니면 칩 숨김
      if (!parent) { el.style.display = 'none'; el.innerHTML = ''; return; }

      const subs = parent === 'logistics' ? logisticsSubcategories : stockSubcategories;
      const chip = (cat, label) => {
        const active = currentCategory === cat;
        return `<button onclick="selectCategory('${cat}')"
          class="shrink-0 px-3.5 py-2 rounded-full border text-[1rem] whitespace-nowrap transition
            ${active ? 'bg-gold text-ink border-gold font-semibold' : 'bg-ink2 text-muted border-line hover:bg-ink3'}">
          ${label}</button>`;
      };

      // 맨 앞: 상위 전체 보기 → 그다음: 각 하위 섹션
      el.innerHTML =
        chip(parent, categoryLabels[parent] + ' 전체') +
        subs.map((s) => chip(s.key, s.label)).join('');
      el.style.display = 'flex';
    }

    // ---------------------------------------------------------------
    // 검색 실행
    // ---------------------------------------------------------------
    async function runSearch() {
      if (isLoading) return;
      if (settingMode) closeSettingView(false);   // [추가] 설정 화면이 열려 있으면 닫고 기사 화면으로
      isLoading = true;
      hideFallbackBanner();
      document.getElementById('cat-header').classList.add('hidden');
      setSearchButtonLoading(true);
      renderLoadingSkeleton();

      const keyword = document.getElementById('search-input').value.trim();
      const dateFrom = '';   // 시작일/종료일 입력은 제거됨 (게재기간 필터로 대체)
      const dateTo = '';

      document.getElementById('status-line').textContent = keyword
        ? `"${keyword}" 관련 뉴스를 검색하는 중입니다...`
        : '뉴스를 검색하는 중입니다...';

      nextId = 0;
      currentResults = [];
      sectionState = [];

      try {
        if (keyword) {
          const data = await fetchFlatNews({ q: keyword, sort: getSort() });
          const list = sortItemsByCurrent(decorateItems(data.items, ['all', 'logistics', 'stock', 'briefing'].includes(currentCategory) ? 'society' : currentCategory));
          currentResults = list;

          const modeText = data.mode === 'or' ? 'OR(하나라도 포함)' : 'AND(모두 포함)';
          const periodText = getHours() === 'all' ? '전체 기간' : `최근 ${hoursLabel()} 이내`;
          document.getElementById('status-line').textContent =
            `"${keyword}" 검색 결과 · ${modeText} · ${periodText}`;
          renderNews(list);

          if (!list.length) {
            showFallbackBanner('조건에 맞는 기사를 찾지 못했습니다. 키워드를 줄이거나 콤마(,)로 나눠보세요.');
          } else if (data.relaxed) {
            showFallbackBanner(`요청하신 기간(${data.requested})에 결과가 없어 "${data.relaxed}" 조건으로 넓혀 검색했습니다.`);
          }

        } else if (currentCategory === 'briefing') {
          const items = await fetchBriefing({ dateFrom, dateTo });
          const list = sortItemsByCurrent(decorateItems(items, 'briefing'));
          currentResults = list;
          document.getElementById('status-line').textContent =
            `현재 시각 기준 가장 이슈가 되는 뉴스 ${list.length}건입니다.`;
          renderBriefing(list);
          if (!list.length) showFallbackBanner('브리핑에 표시할 기사를 찾지 못했습니다.');

        } else if (['all', 'logistics', 'stock'].includes(currentCategory)) {
          const endpoint = currentCategory === 'all' ? '/api/all/sections' : `/api/${currentCategory}/sections`;
          const sections = await fetchSectionsData(endpoint, { dateFrom, dateTo });
          sectionState = sections.map((sec) => ({
            key: sec.key,
            label: sec.label,
            items: sortItemsByCurrent(decorateItems(sec.items, sec.key)),
            count: getCount(),
            collapsed: false,
          }));
          mergeCatsAcrossSections(sectionState);
          currentResults = sectionState.flatMap((s) => s.items);
          document.getElementById('status-line').textContent =
            `${currentCategory === 'all' ? '전체' : categoryLabels[currentCategory]} 카테고리 뉴스입니다. (최근 ${hoursLabel()} 이내 · 제목을 누르면 접기/펼치기)`;
          renderSectionsFromState();
          if (!currentResults.length) showFallbackBanner('조건에 맞는 기사를 찾지 못했습니다. 기간을 조정해보세요.');

        } else if (currentCategory.startsWith('logistics_') || currentCategory.startsWith('stock_')) {
          const base = currentCategory.split('_')[0];
          const items = await fetchSubSectionData(base, currentCategory, { dateFrom, dateTo });
          const list = sortItemsByCurrent(decorateItems(items, currentCategory));
          currentResults = list;
          document.getElementById('status-line').textContent = `${categoryLabels[currentCategory]} 분야 뉴스입니다. (최근 ${hoursLabel()} 이내)`;
          renderNews(list);
          if (!list.length) showFallbackBanner(`최근 ${hoursLabel()} 이내 기사를 찾지 못했습니다. 게재 기간을 늘려보세요.`);

        } else if (currentCategory === 'breaking') {
          const bp = new URLSearchParams({ display: String(getCount()) });
          setKwParam(bp);   // [추가] 키워드 설정 반영
          const data = await apiGet(`/api/breaking?${bp.toString()}`);
          const list = sortItemsByCurrent(decorateItems(data.items || [], 'breaking'));
          currentResults = list;
          document.getElementById('status-line').textContent = '최근 1시간 이내 속보입니다.';
          renderNews(list);
          if (!list.length) showFallbackBanner('최근 1시간 이내 속보가 없습니다.');

        } else {
          // 경제 / 정치·사회 / 글로벌 : '전체' 화면과 동일한 키워드 설정으로 수집
          const items = await fetchTopic(currentCategory, { dateFrom, dateTo });
          const list = sortItemsByCurrent(decorateItems(items, currentCategory));
          currentResults = list;
          document.getElementById('status-line').textContent = `${categoryLabels[currentCategory]} 분야 뉴스입니다. (최근 ${hoursLabel()} 이내)`;
          renderNews(list);
          if (!list.length) showFallbackBanner(`최근 ${hoursLabel()} 이내 기사를 찾지 못했습니다. 게재 기간을 늘려보세요.`);
        }

        document.getElementById('news-count').textContent = visibleCount();
        updateCatHeader();
      } catch (err) {
        console.error(err);
        renderError(err.message || '뉴스를 불러오는 중 오류가 발생했습니다.');
        document.getElementById('status-line').textContent = '검색 중 오류가 발생했습니다.';
        document.getElementById('news-count').textContent = 0;
      } finally {
        isLoading = false;
        setSearchButtonLoading(false);
      }
    }

    function setSearchButtonLoading(loading) {
      const btn = document.getElementById('search-btn');
      btn.disabled = loading;
      btn.innerHTML = loading
        ? icon('loader-2', 'w-4 h-4 animate-spin') + ' 검색중'
        : icon('search', 'w-4 h-4') + ' 검색';
    }

    // ---------------------------------------------------------------
    // 렌더링
    // ---------------------------------------------------------------
    function renderLoadingSkeleton() {
      document.getElementById('news-list').innerHTML = Array.from({ length: 4 }).map(() => `
        <div class="skeleton bg-ink2/70 border border-line rounded-2xl p-5 h-28"></div>`).join('');
    }

    function renderError(message) {
      document.getElementById('news-list').innerHTML = `
        <div class="py-16 text-center text-muted bg-ink2/50 border border-line rounded-2xl">
          ${icon('alert-triangle', 'w-10 h-10 mx-auto mb-3 text-amber-400/80')}
          <p>${message}</p>
          <button onclick="runSearch()" class="mt-4 text-gold hover:text-gold2 border border-gold/40 rounded-lg px-4 py-2 transition">다시 시도</button>
        </div>`;
      document.getElementById('news-count').textContent = 0;
    }

    // 요약 글머리표(ㆍ) 3개
    function summaryListHtml(sentences) {
      return (sentences || []).slice(0, 3).map(s =>
        `<li class="flex gap-2"><span class="text-gold shrink-0">ㆍ</span><span>${s}</span></li>`).join('');
    }

    // 이 기사가 걸린 카테고리 목록 (원본 그대로 · 하위 섹션 포함)
    function catsOf(item) {
      const list = (Array.isArray(item.cats) && item.cats.length)
        ? item.cats
        : [item.cat || item.category];
      return [...new Set(list.filter(Boolean))];
    }

    // [태그 규칙] 하위 섹션은 최상위 섹션으로 변환하고 중복을 제거한다.
    //  예) stock_domestic → stock(증시),  logistics_lotte → logistics(물류)
    //  최상위가 없는 일반 섹션(경제/사회/글로벌 등)은 그대로 둔다.
    //  → 이 목록이 기사 제목 위에 표시할 '태그'가 된다. (요청 3·5)
    function tagCatsOf(item) {
      const mapped = catsOf(item).map((c) => parentCategoryOf(c) || c);
      return [...new Set(mapped.filter(Boolean))];
    }

    // [태그 표시] 모든 태그를 동일하게: 파란색 · 아이콘 없음 · 텍스트만 (요청 1·2)
    //  섹션이 겹치는 기사는 태그를 모두 표시한다. (요청 5)
    function badgesHtml(item) {
      return tagCatsOf(item).map((c) =>
        `<span class="font-bold uppercase tracking-widest text-[0.7rem] px-1.5 py-0.5 bg-wire/15 text-wire rounded border border-wire/30">${categoryLabels[c] || '기타'}</span>`
      ).join('');
    }

    // 요약 / 주요 내용 / 원문보기 버튼 묶음 (기사 제목 오른쪽에 배치)
    function actionsHtml(item) {
      return `
        <div class="shrink-0 flex items-center gap-1.5 sm:justify-end">
          <button onclick="openSummary(${item.id})" title="요약"
            class="flex items-center gap-1 bg-ink3 hover:bg-line text-paper text-[0.8rem] px-2 py-1 rounded-md transition border border-line whitespace-nowrap">
            ${icon('file-text', 'w-3 h-3')} 요약
          </button>
          <button onclick="openBrief(${item.id})" title="주요 내용"
            class="flex items-center gap-1 bg-gold/15 hover:bg-gold/25 text-gold2 text-[0.8rem] px-2 py-1 rounded-md transition border border-gold/30 whitespace-nowrap">
            ${icon('sparkles', 'w-3 h-3')} 주요 내용
          </button>
          <a href="${esc(articleLink(item))}" target="_blank" rel="noopener noreferrer" title="원문보기"
            class="flex items-center gap-1 text-wire hover:text-blue-300 text-[0.8rem] px-2 py-1 rounded-md transition border border-wire/30 bg-wire/10 whitespace-nowrap">
            원문보기 ${icon('external-link', 'w-3 h-3')}
          </a>
        </div>`;
    }

    function newsCardHtml(item) {
      // 모든 화면에서 동일한 규칙으로 태그를 표시한다.
      //  - 파란색 · 아이콘 없음 · 텍스트만
      //  - 하위 섹션은 최상위(물류/증시)로 변환
      //  - 겹치는 섹션은 모두 표시 (누락 없음)
      const badges = badgesHtml(item);
      return `
        <article class="news-row bg-ink2/60 border border-line rounded-xl p-4 hover:border-gold/40 transition-all duration-300">
          <div class="flex items-center gap-2 flex-wrap mb-2">
            ${badges}
            <span class="text-muted font-mono text-[0.72rem]">${item.source}${item.datetime ? ' · ' + formatDate(item.datetime) : ''}</span>
          </div>
          <div class="flex flex-col sm:flex-row sm:items-start gap-3">
            <h3 class="row-title flex-1 min-w-0 font-sans text-[1.46rem] font-bold text-paper transition leading-snug break-keep">${item.title}</h3>
            ${actionsHtml(item)}
          </div>
        </article>`;
    }

    function emptyBoxHtml(msg) {
      return `
        <div class="py-16 text-center text-muted bg-ink2/50 border border-line rounded-2xl">
          ${icon('inbox', 'w-10 h-10 mx-auto mb-3 opacity-60')}
          <p>${msg}</p>
        </div>`;
    }

    // Today's Briefing : 순위 + 카테고리 배지 + 핵심 2줄 요약
    function renderBriefing(list) {
      const wrap = document.getElementById('news-list');
      if (!list.length) { wrap.innerHTML = emptyBoxHtml('브리핑에 표시할 뉴스가 없습니다.'); return; }

      wrap.innerHTML = `
        <section class="bg-ink2/40 border border-gold/30 rounded-2xl overflow-hidden">
          <header class="flex items-center gap-2.5 px-5 py-3 bg-gradient-to-r from-gold/15 to-transparent border-b border-line">
            ${icon('sparkles', 'w-5 h-5 text-gold')}
            <h2 class="font-sans font-bold text-gold text-xl">Today's Briefing</h2>
            <span class="text-muted font-mono ml-auto">${list.length}건 · ${new Date().toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', hour12: false })} KST 기준</span>
          </header>
          <div class="p-4 space-y-3">
            ${list.map((it, i) => `
              <article class="news-row bg-ink2/60 border border-line rounded-xl p-4 hover:border-gold/40 transition">
                <div class="flex gap-4">
                  <div class="shrink-0 w-9 h-9 rounded-lg bg-gold/15 border border-gold/30 text-gold font-mono font-bold flex items-center justify-center">${i + 1}</div>
                  <div class="flex-1 min-w-0 space-y-2">
                    <div class="flex items-center gap-2 flex-wrap">
                      ${badgesHtml(it)}
                      <span class="text-muted font-mono text-[0.72rem]">${it.source}${it.datetime ? ' · ' + formatDate(it.datetime) : ''}</span>
                    </div>
                    <div class="flex flex-col sm:flex-row sm:items-start gap-3">
                      <h3 class="row-title flex-1 min-w-0 font-sans text-[1.46rem] font-bold text-paper leading-snug break-keep">${it.title}</h3>
                      ${actionsHtml(it)}
                    </div>
                  </div>
                </div>
              </article>`).join('')}
          </div>
        </section>`;

    }

    function renderNews(list) {
      const wrap = document.getElementById('news-list');
      if (!list.length) { wrap.innerHTML = emptyBoxHtml('검색 조건에 맞는 뉴스가 없습니다.'); return; }
      wrap.innerHTML = list.map((it) => newsCardHtml(it)).join('');
    }

    // ---- 카테고리 박스: 접기/펼치기 + 개수 필터 ----
    function toggleSection(key) {
      const s = sectionState.find(x => x.key === key);
      if (!s) return;
      s.collapsed = !s.collapsed;
      renderSectionsFromState();
    }

    // 한 섹션 박스의 '노출 건수'를 바꾸면 → 그 섹션만 즉시 다시 보여준다.
    //  - 이미 받아둔 기사로 충분하면 재요청 없이 바로 반영 (토큰/요청 절약)
    //  - 더 많이 요청하면 '그 섹션 하나만' 서버에서 다시 가져온다 (다른 섹션은 그대로 유지)
    async function changeSectionCount(key, v) {
      const s = sectionState.find(x => x.key === key);
      if (!s) return;
      const newCount = Number(v) || 5;
      s.count = newCount;
      s.collapsed = false;

      // 받아둔 기사(최대 30건)로 충분 → 재요청 없이 그 섹션만 즉시 다시 그림
      if (newCount <= s.items.length) { renderSectionsFromState(); return; }

      // 더 많이 요청 → 그 섹션 하나만 서버에서 즉시 리프레시
      s._loading = true;
      renderSectionsFromState();
      try {
        const fresh = await fetchOneSection(key, newCount);
        if (fresh) {
          s.items = sortItemsByCurrent(decorateItems(fresh, key));
          mergeCatsAcrossSections(sectionState);                 // 섹션 겹침 태그 다시 계산
          currentResults = sectionState.flatMap((x) => x.items); // 요약/원문 링크가 새 기사를 찾도록 갱신
        }
      } catch (err) {
        console.error(err);
      } finally {
        s._loading = false;
        renderSectionsFromState();
      }
    }

    // [추가] 지금 보고 있는 묶음 화면에서 '한 섹션'만 다시 가져온다.
    //  - 전체(all) 화면  : 최상위 섹션      → /api/topic/{key}
    //  - 물류/증시 화면  : 하위 섹션        → /api/{base}/section/{key}
    async function fetchOneSection(key, count) {
      const params = new URLSearchParams({ display: String(count), hours: String(getHours()) });
      setKwParam(params);   // 현재 키워드 설정 반영
      let endpoint;
      if (currentCategory === 'all') {
        endpoint = `/api/topic/${key}`;
      } else {
        const base = key.split('_')[0];   // 예) logistics_competitor → logistics
        endpoint = `/api/${base}/section/${key}`;
      }
      const data = await apiGet(`${endpoint}?${params.toString()}`);
      return Array.isArray(data.items) ? data.items : [];
    }

    function visibleCount() {
      if (sectionState.length) return sectionState.reduce((s, x) => s + Math.min(x.count, x.items.length), 0);
      return currentResults.length;
    }

    function renderSectionsFromState() {
      const wrap = document.getElementById('news-list');
      const total = sectionState.reduce((s, sec) => s + sec.items.length, 0);
      if (total === 0) { wrap.innerHTML = emptyBoxHtml('검색 조건에 맞는 뉴스가 없습니다.'); return; }

      wrap.innerHTML = sectionState.map((sec) => {
        const shown = sec.items.slice(0, sec.count);
        return `
        <section class="bg-ink2/40 border border-line rounded-2xl overflow-hidden">
          <header class="flex items-center gap-3 px-5 py-3 bg-ink3/60 border-b border-line">
            <button onclick="toggleSection('${sec.key}')" class="flex items-center gap-2.5 flex-1 min-w-0 text-left hover:opacity-80 transition">
              ${icon(categoryIcons[sec.key] || 'grid', 'w-5 h-5 text-gold shrink-0')}
              <h2 class="font-sans font-bold text-gold text-xl truncate">${sec.label}</h2>
              ${icon(sec.collapsed ? 'chevron-down' : 'chevron-up', 'w-4 h-4 text-muted shrink-0')}
            </button>
            <span class="text-muted font-mono whitespace-nowrap">${sec._loading ? icon('loader-2', 'w-4 h-4 animate-spin') : shown.length + '건'}</span>
            <select onchange="changeSectionCount('${sec.key}', this.value)"
              class="bg-ink border border-line rounded-lg px-2 py-1 text-paper font-mono focus:outline-none focus:border-gold/70">
              ${[3, 5, 10, 15, 20, 30].map(n => `<option value="${n}" ${sec.count === n ? 'selected' : ''}>${n}개</option>`).join('')}
            </select>
          </header>
          <div class="${sec.collapsed ? 'hidden' : ''} p-4 space-y-3">
            ${shown.length
              ? shown.map((it) => newsCardHtml(it)).join('')
              : `<div class="text-muted text-center py-8">해당 카테고리의 기사를 찾지 못했습니다.</div>`}
          </div>
        </section>`;
      }).join('');

      document.getElementById('news-count').textContent = visibleCount();
      updateCatHeader();
    }

    // ---- 원문에서 핵심 3줄 요약 (요약 버튼 클릭 시에만 호출) ----
    const coreSummaryCache = new Map();

    function applySummary(it, sentences) {
      it.summary = sentences.slice(0, 3);
      it.enriched = true;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }) + ' ' +
             d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // ---------------------------------------------------------------
    // 지수 티커
    // ---------------------------------------------------------------
    function formatIndexEntry(item) {
      const isUp = item.change > 0, isDown = item.change < 0;
      const arrow = isUp ? '▲' : isDown ? '▼' : '－';
      const colorClass = isUp ? 'text-rose-400' : isDown ? 'text-blue-400' : 'text-muted';
      const priceStr = item.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const changeStr = Math.abs(item.change).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const pctStr = Math.abs(item.changePercent).toFixed(2);
      return `<span class="flex items-center gap-2">
        <span class="text-gold font-semibold tracking-wider">${item.name}</span>
        <span class="tabular-nums text-paper">${priceStr}</span>
        <span class="${colorClass} tabular-nums">${arrow}${changeStr} (${arrow}${pctStr}%)</span></span>`;
    }

    // KOSPI → KOSDAQ → NASDAQ → S&P 500 → DOW JONES 순서 고정
    const INDEX_ORDER = ['KOSPI', 'KOSDAQ', 'NASDAQ', 'S&P 500', 'DOW JONES'];

    function renderIndexTicker(items) {
      const sorted = [...items].sort(
        (a, b) => INDEX_ORDER.indexOf(a.name) - INDEX_ORDER.indexOf(b.name)
      );
      const html = sorted.length
        ? sorted.map(formatIndexEntry).join('')
        : '<span>지수 정보를 불러오는 중입니다...</span>';
      // 같은 내용을 두 벌 채워야 끊김 없이 계속 순환한다
      document.getElementById('ticker-content').innerHTML = html;
      document.getElementById('ticker-content-2').innerHTML = html;
    }

    async function refreshIndexTicker() {
      try {
        const res = await fetch(`${NAVER_PROXY_BASE}/api/indices`);
        if (!res.ok) throw new Error('지수 API 오류: ' + res.status);
        const data = await res.json();
        if (!Array.isArray(data.items) || !data.items.length) throw new Error('지수 데이터 없음');
        renderIndexTicker(data.items);
      } catch (err) {
        console.error(err);
        const msg = '<span>지수 정보를 불러올 수 없습니다.</span>';
        document.getElementById('ticker-content').innerHTML = msg;
        document.getElementById('ticker-content-2').innerHTML = msg;
      }
    }

    // ---------------------------------------------------------------
    // 요약 모달
    // ---------------------------------------------------------------
    function paintSummary(sentences) {
      document.getElementById('modal-summary').innerHTML = summaryListHtml(sentences);
    }

    async function openSummary(id) {
      const item = currentResults.find(n => n.id === id);
      if (!item) return;
      const link = articleLink(item);   // [수정] 원문보기와 똑같은 주소를 요약에도 사용
      document.getElementById('modal-category').textContent =
        catsOf(item).map((c) => categoryLabels[c] || '기타').join(', ');
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-source').textContent = item.source;
      document.getElementById('modal-time').textContent = item.datetime ? ' · ' + formatDate(item.datetime) : '';
      document.getElementById('modal-link').href = link;
      document.getElementById('summary-modal').classList.remove('hidden');

      // 요약은 반드시 '원문 본문'에서 추출한 핵심 3문장만 보여준다
      paintSummary([]);
      const loading = document.getElementById('modal-loading');

      if (!link || link === '#') { paintSummary(['요약할 원문 주소가 없습니다.']); return; }
      if (coreSummaryCache.has(link)) { paintSummary(coreSummaryCache.get(link)); return; }

      loading.classList.remove('hidden');
      try {
        // [수정] 원문이 막혔을 때 서버가 우회할 수 있도록 네이버 링크와 기존 요약문을 함께 보낸다
        const p = new URLSearchParams({ url: link, max: '3' });
        if (item.naverUrl) p.set('naver', item.naverUrl);
        if (item.title) p.set('title', item.title);   // [추가] 제목 핵심 단어로 문장 선별
        if (Array.isArray(item.summary)) p.set('desc', item.summary.join(' ').slice(0, 1000));
        const res = await fetch(`${NAVER_PROXY_BASE}/api/article-summary?${p.toString()}`);
        const data = await res.json();
        if (Array.isArray(data.sentences) && data.sentences.length) {
          coreSummaryCache.set(link, data.sentences);
          applySummary(item, data.sentences);
          if (!document.getElementById('summary-modal').classList.contains('hidden')) paintSummary(data.sentences);
        } else {
          paintSummary(['원문에서 본문을 추출하지 못했습니다. 원문보기를 이용해 주세요.']);
        }
      } catch (e) {
        console.error(e);
        paintSummary(['요약을 불러오지 못했습니다. 원문보기를 이용해 주세요.']);
      } finally { loading.classList.add('hidden'); }
    }

    function closeSummary() { document.getElementById('summary-modal').classList.add('hidden'); }
    function closeSummaryOnBackdrop(e) { if (e.target.id === 'summary-modal') closeSummary(); }
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeSummary(); closeBrief(); } });

    // ---------------------------------------------------------------
    // 주요 내용 모달 (AI 정리)
    // ---------------------------------------------------------------
    function esc(s) {
      return String(s ?? '').replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
    }

    function briefLoadingHtml() {
      return `<div class="space-y-3">
        ${[80, 100, 60].map(w => `<div class="skeleton bg-ink3/70 rounded h-4" style="width:${w}%"></div>`).join('')}
        <p class="text-muted font-mono text-sm pt-2">원문을 읽고 주요 내용을 정리하는 중... (5~15초)</p>
      </div>`;
    }

    function briefHtml(b) {
      const table = (b.table || []).length ? `
        <table class="w-full border-collapse">
          <thead><tr class="border-b border-line">
            <th class="text-left text-muted font-semibold py-2 pr-4 w-32 align-top">항목</th>
            <th class="text-left text-muted font-semibold py-2">내용</th>
          </tr></thead>
          <tbody>${b.table.map(r => `
            <tr class="border-b border-line/60">
              <td class="py-2.5 pr-4 text-gold2 align-top break-keep">${esc(r.key)}</td>
              <td class="py-2.5 text-paper/90 break-keep leading-relaxed">${esc(r.value)}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '';

      const bullets = (b.bullets || []).length ? `
        <ul class="space-y-2">${b.bullets.map(x => `
          <li class="flex gap-2 text-paper/90 leading-relaxed break-keep">
            <span class="text-gold shrink-0">ㆍ</span><span>${esc(x)}</span>
          </li>`).join('')}</ul>` : '';

      return `
        ${b.headline ? `<h3 class="font-sans text-[1.7rem] font-bold text-paper leading-snug break-keep">${esc(b.headline)}</h3>` : ''}
        ${b.lead ? `<p class="text-paper/90 leading-relaxed break-keep">${esc(b.lead)}</p>` : ''}
        ${table ? `<div><h4 class="font-bold text-gold2 text-lg mb-2">핵심 정리</h4>${table}</div>` : ''}
        ${bullets ? `<div><h4 class="font-bold text-gold2 text-lg mb-2">주요 포인트</h4>${bullets}</div>` : ''}`;
    }

    async function openBrief(id) {
      const item = currentResults.find(n => n.id === id);
      if (!item) return;

      const link = articleLink(item);   // [수정] 원문보기와 똑같은 주소를 AI 정리에도 사용
      document.getElementById('brief-link').href = link;
      document.getElementById('brief-note').textContent = '';
      document.getElementById('brief-body').innerHTML = briefLoadingHtml();
      document.getElementById('brief-modal').classList.remove('hidden');

      try {
        const params = new URLSearchParams({ url: link, title: item.title });
        if (item.naverUrl) params.set('naver', item.naverUrl);   // 원문 차단 시 네이버 뉴스로 우회
        // [수정] 본문을 끝내 못 읽으면 네이버 요약문이라도 근거로 쓰도록 함께 전달
        if (Array.isArray(item.summary)) params.set('desc', item.summary.join(' ').slice(0, 1000));
        const res = await fetch(`${NAVER_PROXY_BASE}/api/deep-brief?${params.toString()}`);
        const data = await res.json();

        if (data.error) {
          document.getElementById('brief-body').innerHTML =
            `<div class="text-amber-200 bg-amber-900/20 border border-amber-800/40 rounded-xl px-4 py-3">${esc(data.error)}</div>`;
          return;
        }
        document.getElementById('brief-body').innerHTML = briefHtml(data);
        document.getElementById('brief-note').textContent = data.partial
          ? `원문 본문을 읽지 못해 네이버 요약문만으로 정리했습니다 · 자세한 내용은 원문보기를 이용하세요`
          : `AI(${data.model || 'Gemini'})가 원문을 읽고 정리했습니다 · 사실 확인은 원문을 참고하세요`;
      } catch (e) {
        console.error(e);
        document.getElementById('brief-body').innerHTML =
          `<div class="text-amber-200 bg-amber-900/20 border border-amber-800/40 rounded-xl px-4 py-3">정리를 불러오지 못했습니다.</div>`;
      }
    }

    function closeBrief() { document.getElementById('brief-modal').classList.add('hidden'); }
    function closeBriefOnBackdrop(e) { if (e.target.id === 'brief-modal') closeBrief(); }

    function hideFallbackBanner() { document.getElementById('fallback-banner').classList.add('hidden'); }
    function showFallbackBanner(msg) {
      document.getElementById('fallback-message').textContent = msg;
      document.getElementById('fallback-banner').classList.remove('hidden');
    }

    window.onload = init;
  </script>
</body>
</html>
